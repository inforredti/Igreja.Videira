<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WiFi Visitantes</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
width:90%;
max-width:350px;
padding:30px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.logo{
width:110px;
margin-bottom:15px;
}

h1{
margin:10px 0;
}

p{
color:#555;
}

.btn{
display:block;
width:100%;
padding:15px;
margin-top:18px;
border-radius:10px;
font-size:16px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.btn:active{
transform:scale(0.97);
}

.instagram{
background:linear-gradient(45deg,#833AB4,#FD1D1D,#F77737);
color:white;
}

.timer{
margin-top:18px;
font-weight:bold;
color:#333;
font-size:15px;
}

.footer{
margin-top:22px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="card">

<img src="channels4_profile.png" class="logo">

<h1>WiFi Visitantes</h1>

<p>Siga nosso Instagram para acessar a internet</p>

<a class="btn instagram"
href="https://instagram.com/videira.anapolis"
target="_blank"
id="botaoInstagram">
Seguir no Instagram
</a>

<div class="timer" id="contador">
Liberando internet em 10 segundos...
</div>

<div class="footer">
Internet gratuita para visitantes
</div>

</div>

<script>

let tempo = 10

let contador = setInterval(function(){

tempo--

document.getElementById("contador").innerText =
"Liberando internet em " + tempo + " segundos..."

if(tempo <= 0){

clearInterval(contador)

// libera navegação
window.location.href="http://neverssl.com"

}

},1000)

// tenta abrir app do instagram quando clicar
document.getElementById("botaoInstagram").addEventListener("click", function(){

setTimeout(function(){
window.location.href="instagram://user?username=videira.anapolis"
},300)

})

</script>

</body>

</html>
