<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WiFi Visitantes</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
width:340px;
padding:30px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
width:110px;
margin-bottom:15px;
}

.btn{
display:block;
width:100%;
padding:14px;
margin-top:15px;
border-radius:8px;
font-size:16px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.instagram{
background:linear-gradient(45deg,#833AB4,#FD1D1D,#F77737);
color:white;
}

.footer{
margin-top:20px;
font-size:13px;
color:#777;
}

.timer{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<img src="channels4_profile.png" class="logo">

<h1>WiFi Visitantes</h1>

<p>Siga nosso Instagram para acessar a internet</p>

<a class="btn instagram"
href="instagram://user?username=videira.anapolis"
id="botaoInstagram">
Seguir no Instagram
</a>

<div class="timer" id="contador">
Liberando internet em 10 segundos...
</div>

<div class="footer">
Internet gratuita para visitantes
</div>

</div>

<script>

// tenta abrir instagram automaticamente
setTimeout(function(){
window.location.href="instagram://user?username=videira.anapolis"
},1500)

// fallback caso app não abra
setTimeout(function(){
window.location.href="https://instagram.com/videira.anapolis"
},3500)

// contador
let tempo = 10

let contador = setInterval(function(){

tempo--

document.getElementById("contador").innerText =
"Liberando internet em " + tempo + " segundos..."

if(tempo <= 0){

clearInterval(contador)

// libera internet
window.location.href="http://neverssl.com"

}

},1000)

</script>

</body>

</html>
