<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Igreja Videira</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0047B3,#002D73);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:white;
width:90%;
max-width:360px;
padding:40px;
border-radius:18px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.logo{
width:140px;
margin-bottom:20px;
}

h1{
margin:0;
font-size:26px;
color:#002D73;
}

p{
color:#666;
margin-top:8px;
}

.btn{
display:block;
margin-top:25px;
background:#E1306C;
color:white;
padding:18px;
border-radius:10px;
font-size:18px;
font-weight:bold;
text-decoration:none;
cursor:pointer;
}

.btn:hover{
background:#c1275a;
}

.followers{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:#222;
}

.small{
margin-top:12px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="card">

<img class="logo" src="channels4_profile.png">

<h1>Igreja Videira</h1>

<p>Siga nosso Instagram</p>

<div class="followers" id="followers">
Carregando seguidores...
</div>

<button class="btn" onclick="conectar()">
Conectar e abrir Instagram
</button>

<div class="small">
Ao clicar você será conectado à internet
</div>

</div>

<script>

function conectar(){

// abre instagram
var app="instagram://user?username=videira.anapolis";
var web="https://www.instagram.com/videira.anapolis/";

window.location=app;

setTimeout(function(){
window.location=web;
},1500);

// força teste de internet para liberar portal
setTimeout(function(){
fetch("http://neverssl.com",{mode:"no-cors"});
},500);

}

// contador seguidores
fetch("https://i.instagram.com/api/v1/users/web_profile_info/?username=videira.anapolis")
.then(response=>response.json())
.then(data=>{

var seguidores=data.data.user.edge_followed_by.count;

document.getElementById("followers").innerHTML =
seguidores.toLocaleString()+" seguidores";

})
.catch(()=>{

document.getElementById("followers").innerHTML="@videira.anapolis";

});

</script>

</body>

</html>
