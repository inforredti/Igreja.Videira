<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WiFi Visitantes</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
width:330px;
padding:30px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
width:110px;
margin-bottom:15px;
}

.btn{
display:block;
width:100%;
padding:15px;
margin-top:20px;
border-radius:10px;
font-size:16px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
border:none;
}

.instagram{
background:linear-gradient(45deg,#833AB4,#FD1D1D,#F77737);
color:white;
}

.footer{
margin-top:20px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="card">

<img src="channels4_profile.png" class="logo">

<h2>WiFi Visitantes</h2>

<p>Siga nosso Instagram para acessar a internet</p>

<button class="btn instagram" onclick="abrirInstagram()">
Seguir no Instagram
</button>

<div class="footer">
Internet gratuita para visitantes
</div>

</div>

<script>

function abrirInstagram(){

// abre instagram direto
window.location.href = "instagram://user?username=videira.anapolis";

// fallback caso não tenha app
setTimeout(function(){
window.location.href = "https://instagram.com/videira.anapolis";
},1200);

// libera navegação depois
setTimeout(function(){
window.location.href = "http://neverssl.com";
},3000);

}

</script>

</body>
</html>
