<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WiFi Visitantes</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
width:90%;
max-width:340px;
padding:30px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
width:110px;
margin-bottom:10px;
}

p{
color:#555;
}

.btn{
display:block;
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
font-size:16px;
text-decoration:none;
font-weight:bold;
}

.instagram{
background:linear-gradient(45deg,#833AB4,#FD1D1D,#F77737);
color:white;
}

.liberar{
background:#28a745;
color:white;
}

.progress{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
margin-top:20px;
overflow:hidden;
}

.bar{
height:8px;
width:0%;
background:#4facfe;
transition:width 0.5s;
}

.footer{
margin-top:20px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="card">

<img src="channels4_profile.png" class="logo">

<h2>WiFi Visitantes</h2>

<p>Siga nosso Instagram para acessar a internet</p>

<a class="btn instagram"
href="https://instagram.com/videira.anapolis">
Seguir no Instagram
</a>

<a class="btn liberar" onclick="liberar()">
Já segui ✔
</a>

<div class="progress">
<div class="bar" id="barra"></div>
</div>

<div class="footer">
Internet gratuita para visitantes
</div>

</div>

<script>

let progresso = 0

function liberar(){

let barra = document.getElementById("barra")

let intervalo = setInterval(function(){

progresso += 20

barra.style.width = progresso + "%"

if(progresso >= 100){

clearInterval(intervalo)

window.location.href="http://neverssl.com"

}

},500)

}

</script>

</body>

</html>
