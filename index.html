<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WiFi Visitantes</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
width:340px;
padding:30px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
width:110px;
margin-bottom:15px;
}

.btn{
display:block;
width:100%;
padding:14px;
margin-top:15px;
border-radius:8px;
font-size:16px;
text-decoration:none;
font-weight:bold;
}

.instagram{
background:linear-gradient(45deg,#833AB4,#FD1D1D,#F77737);
color:white;
}

.wifi{
background:#2ecc71;
color:white;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="card">

<img src="channels4_profile.png" class="logo">

<h1>WiFi Visitantes</h1>

<p>Siga nosso Instagram para acessar a internet</p>

<a class="btn instagram"
href="https://instagram.com/videira.anapolis"
target="_blank"
rel="noopener">
Seguir no Instagram
</a>

<a class="btn wifi"
href="https://www.google.com"
target="_blank"
rel="noopener">
Conectar ao WiFi
</a>

<div class="footer">
Internet gratuita para visitantes
</div>

</div>

</body>

</html>
