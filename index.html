<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WiFi Visitantes</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
width:90%;
max-width:340px;
padding:30px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
width:110px;
margin-bottom:10px;
}

.progress{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
margin-top:20px;
overflow:hidden;
}

.bar{
height:8px;
width:0%;
background:#4facfe;
animation:carregar 3s linear forwards;
}

@keyframes carregar{
0%{width:0%;}
100%{width:100%;}
}

</style>

</head>

<body>

<div class="card">

<img src="channels4_profile.png" class="logo">

<h2>WiFi Visitantes</h2>

<p>Conectando você...</p>

<div class="progress">
<div class="bar"></div>
</div>

</div>

<script>

setTimeout(function(){

window.location.href="$authaction?username=visitante&password=123456"

},2500)

setTimeout(function(){

window.location.href="https://instagram.com/videira.anapolis"

},5000)

</script>

</body>

</html>
